# ==========================================================
# Configuração Hyprlock - Inspirada na simplicidade do Ly
# ==========================================================

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    color = rgba(0, 0, 0, 1.0) # Fundo 100% preto, igual ao terminal
}

# --------------------------------------------------
# Linha de Prompt (Simulando o Ly)
# Localizada logo acima da caixa de senha
# --------------------------------------------------
label {
    monitor =
    # Texto clássico de terminal: usuário@host login:
    text = cmd[update:0] echo "$USER@$(cat /etc/hostname) login:"
    color = rgba(255, 255, 255, 1.0) # Branco puro
    font_size = 14
    font_family = Monospace # Fonte de terminal obrigatória
    position = 0, 30 # Levemente acima do centro (Y=30)
    halign = center
    valign = center
}

# --------------------------------------------------
# Caixa de Entrada de Senha (Estilo Ly/dmenu)
# Totalmente quadrada e minimalista
# --------------------------------------------------
input-field {
    monitor =
    size = 280, 40
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = 0 # KEY: Pontinhos da senha são quadrados

    # Cores rigorosas do i3wm/Waybar que definimos
    outer_color = rgb(51, 51, 51) # Cinza escuro da borda (#333333)
    inner_color = rgb(0, 0, 0) # Fundo preto puro dentro da caixa
    font_color = rgb(255, 255, 255) # Texto branco

    fade_on_empty = false
    # Placeholder simulando o prompt de senha do Ly
    placeholder_text = <span foreground="##555555">Password:</span>
    hide_input = false
    rounding = 0 # KEY: Cantos 100% quadrados (Sharp corners)

    # Cores de estado (mantendo o padrão de feedback)
    check_color = rgb(40, 85, 119) # Azul da seleção da Waybar ao verificar
    fail_color = rgb(204, 34, 34) # Vermelho ao falhar

    position = 0, -10 # Levemente abaixo do centro (Y=-10)
    halign = center
    valign = center
}
